        - "labporter-files/gns3-bgp-frr/asn1border1/etc/frr:/etc/frr"
      cmd: "sleep infinity"
      cap-add:
        - "NET_ADMIN"
        - "SYS_ADMIN"
      sysctls:
        net.ipv4.ip_forward: "1"
        net.ipv6.conf.all.forwarding: "1"
